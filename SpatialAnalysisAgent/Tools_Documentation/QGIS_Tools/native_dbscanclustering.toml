tool_ID = "native:dbscanclustering"

tool_name = "DBSCAN Clustering"

brief_description = """Performs DBSCAN density-based spatial clustering on point features. Groups nearby points into clusters. Equivalent to ArcGIS Multivariate Clustering."""

parameters = """INPUT: Input point layer. Type: [vector: point]
MIN_SIZE: Minimum cluster size. Type: [number] Default: 5
EPS: Maximum distance between points in a cluster. Type: [number] Default: 1
SIZE_FIELD_NAME: Name of field for cluster size. Type: [string] Default: 'CLUSTER_SIZE'
CLUSTER_FIELD_NAME: Name of field for cluster ID. Type: [string] Default: 'CLUSTER_ID'
OUTPUT: Output point layer with cluster IDs. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def dbscan_clustering():
    params = {
        'INPUT': 'D:/Data/points.shp',
        'MIN_SIZE': 5,
        'EPS': 500,
        'DBSCAN*': True,
        'SIZE_FIELD_NAME': 'CLUSTER_SIZE',
        'CLUSTER_FIELD_NAME': 'CLUSTER_ID',
        'OUTPUT': 'D:/Output/clusters.shp'
    }
    
    result = processing.run("native:dbscanclustering", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'DBSCAN Clusters', 'ogr')
    QgsProject.instance().addMapLayer(layer)

dbscan_clustering()"""