tool_ID = "qgis:statisticsbycategories"

tool_name = "Summary Statistics by Categories"

brief_description = """Calculates statistics (count, sum, mean, etc.) for a numeric field grouped by category fields. Equivalent to ArcGIS Summary Statistics / Frequency."""

parameters = """INPUT: Input vector layer. Type: [vector: any]
VALUES_FIELD_NAME: Field to calculate statistics on. Type: [tablefield: numeric]
CATEGORIES_FIELD_NAME: Field(s) to group by. Type: [tablefield: any] [list]
OUTPUT: Output statistics table. Type: [table]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def summary_statistics():
    params = {
        'INPUT': 'D:/Data/census.shp',
        'VALUES_FIELD_NAME': 'POPULATION',
        'CATEGORIES_FIELD_NAME': ['STATE', 'COUNTY'],
        'OUTPUT': 'D:/Output/stats.csv'
    }
    
    result = processing.run("qgis:statisticsbycategories", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Statistics', 'ogr')
    QgsProject.instance().addMapLayer(layer)

summary_statistics()"""