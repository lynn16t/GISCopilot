tool_ID = "native:extractvertices"

tool_name = "Feature Vertices to Points"

brief_description = """Extracts vertices from line or polygon features and returns them as a point layer. Equivalent to ArcGIS Feature Vertices to Points."""

parameters = """INPUT: Input vector layer. Type: [vector: line or polygon]
OUTPUT: Output point layer with vertices. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def vertices_to_points():
    params = {
        'INPUT': 'D:/Data/roads.shp',
        'OUTPUT': 'D:/Output/vertices.shp'
    }
    
    result = processing.run("native:extractvertices", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Vertices', 'ogr')
    QgsProject.instance().addMapLayer(layer)

vertices_to_points()"""