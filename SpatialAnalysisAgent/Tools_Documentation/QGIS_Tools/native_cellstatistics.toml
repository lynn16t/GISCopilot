tool_ID = "native:cellstatistics"

tool_name = "Cell Statistics"

brief_description = """Computes per-cell statistics based on input raster layers using a specified statistic (e.g., mean, sum, min, max). Equivalent to ArcGIS Cell Statistics."""

parameters = """INPUT: Input raster layers. Type: [raster] [list]
STATISTIC: Statistic to calculate. 0: Mean, 1: Median, 2: Sum, 3: Minimum, 4: Maximum, 5: Std Dev, 6: Variance, 7: Range, 8: Minority, 9: Majority. Type: [enumeration] Default: 0
IGNORE_NODATA: Ignore NoData values. Type: [boolean] Default: True
OUTPUT: Output raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def cell_statistics():
    params = {
        'INPUT': ['D:/Data/raster1.tif', 'D:/Data/raster2.tif', 'D:/Data/raster3.tif'],
        'STATISTIC': 0,
        'IGNORE_NODATA': True,
        'OUTPUT': 'D:/Output/cell_stats.tif'
    }
    
    result = processing.run("native:cellstatistics", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Cell Statistics')
    QgsProject.instance().addMapLayer(layer)

cell_statistics()"""