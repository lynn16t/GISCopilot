tool_ID = "native:creategrid"

tool_name = "Create Fishnet (Grid)"

brief_description = """Creates a regular grid of points, lines, or polygons covering a specified extent. Equivalent to ArcGIS Create Fishnet."""

parameters = """TYPE: Grid type. 0: Point, 1: Line, 2: Rectangle, 3: Diamond, 4: Hexagon. Type: [enumeration] Default: 0
EXTENT: Grid extent. Type: [extent]
HSPACING: Horizontal spacing. Type: [number] Default: 1
VSPACING: Vertical spacing. Type: [number] Default: 1
HOVERLAY: Horizontal overlap. Type: [number] Default: 0
VOVERLAY: Vertical overlap. Type: [number] Default: 0
CRS: CRS of the output grid. Type: [crs]
OUTPUT: Output grid layer. Type: [vector: any]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer, QgsCoordinateReferenceSystem

def create_fishnet():
    params = {
        'TYPE': 2,
        'EXTENT': '400000,600000,4400000,4600000',
        'HSPACING': 1000,
        'VSPACING': 1000,
        'HOVERLAY': 0,
        'VOVERLAY': 0,
        'CRS': QgsCoordinateReferenceSystem('EPSG:32617'),
        'OUTPUT': 'D:/Output/fishnet.shp'
    }
    
    result = processing.run("native:creategrid", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Fishnet', 'ogr')
    QgsProject.instance().addMapLayer(layer)

create_fishnet()"""