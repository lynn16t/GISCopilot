tool_ID = "gdal:rasterize"

tool_name = "Polygon to Raster (Rasterize)"

brief_description = """Converts a vector layer to a raster layer, burning vector geometries into a raster. Equivalent to ArcGIS Polygon/Polyline/Point to Raster."""

parameters = """INPUT: Input vector layer. Type: [vector: any]
FIELD: Attribute field to use for burn value. Type: [tablefield: numeric]
BURN: Fixed burn value (if no field). Type: [number] Default: 0
WIDTH: Output raster width in pixels. Type: [number]
HEIGHT: Output raster height in pixels. Type: [number]
EXTENT: Output extent. Type: [extent]
NODATA: NoData value. Type: [number] Default: 0
DATA_TYPE: Output data type. Type: [enumeration] Default: 5 (Float32)
OUTPUT: Output raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer, QgsVectorLayer

def polygon_to_raster():
    input_path = 'D:/Data/landuse.shp'
    input_layer = QgsVectorLayer(input_path, 'Landuse', 'ogr')
    
    params = {
        'INPUT': input_path,
        'FIELD': 'class_id',
        'BURN': 0,
        'USE_Z': False,
        'WIDTH': 1000,
        'HEIGHT': 1000,
        'EXTENT': input_layer.extent(),
        'NODATA': -9999,
        'DATA_TYPE': 5,
        'OUTPUT': 'D:/Output/rasterized.tif'
    }
    
    result = processing.run("gdal:rasterize", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Rasterized')
    QgsProject.instance().addMapLayer(layer)

polygon_to_raster()"""