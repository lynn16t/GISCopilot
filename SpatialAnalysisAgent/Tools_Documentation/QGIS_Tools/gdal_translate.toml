tool_ID = "gdal:translate"

tool_name = "Translate (convert raster format)"

brief_description = """Converts raster data between different formats, optionally overriding CRS / NoData / data type / creation options. Wraps the GDAL `gdal_translate` utility.

Common uses:
- Pure copy / format conversion (e.g. .img → .tif)
- Override / set the NoData value of a raster (pass NODATA=<value>)
- Force an output data type via DATA_TYPE
NOTE: there is NO `native:copyraster` algorithm in QGIS 3.40. To make a copy of a raster, use `gdal:translate` with no NODATA/TARGET_CRS overrides."""

parameters = """INPUT: Input raster layer. Type: [raster]
TARGET_CRS: Override the projection for the output file. Optional. Type: [crs]
NODATA: Assign a specified NoData value to output bands. Optional. Type: [number]
COPY_SUBDATASETS: Copy all subdatasets to individual output files. Type: [boolean] Default: False
OPTIONS: GDAL creation options, e.g. 'COMPRESS=LZW'. Type: [string] Default: ''
EXTRA: Additional command-line parameters. Type: [string] Default: ''
DATA_TYPE: Output data type. 0=Use Input, 1=Byte, 2=Int16, 3=UInt16, 4=UInt32, 5=Int32, 6=Float32, 7=Float64, 8=CInt16, 9=CInt32, 10=CFloat32, 11=CFloat64, 12=Int8. Type: [enumeration] Default: 0
OUTPUT: Output (translated) raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def translate_raster():
    input_path  = 'D:/Data/dem.tif'
    output_path = 'D:/Output/dem_copy.tif'

    params = {
        'INPUT': input_path,
        'TARGET_CRS': None,         # leave as None to keep the source CRS
        'NODATA': None,             # pass a number (e.g. -9999) to set/override NoData
        'COPY_SUBDATASETS': False,
        'OPTIONS': '',
        'EXTRA': '',
        'DATA_TYPE': 0,             # 0 = preserve input data type
        'OUTPUT': output_path,
    }

    result = processing.run("gdal:translate", params)

    layer = QgsRasterLayer(result['OUTPUT'], 'Translated', 'gdal')
    QgsProject.instance().addMapLayer(layer)

translate_raster()"""
