tool_ID = "native:meancoordinates"

tool_name = "Mean Center"

brief_description = """Calculates the mean center (geographic center of gravity) of input features. Equivalent to ArcGIS Mean Center."""

parameters = """INPUT: Input vector layer. Type: [vector: any]
WEIGHT: Weight field (optional). Type: [tablefield: numeric]
UID: Unique ID field for grouping (optional). Type: [tablefield: any]
OUTPUT: Output point layer with mean center. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def mean_center():
    params = {
        'INPUT': 'D:/Data/crime_points.shp',
        'WEIGHT': '',
        'UID': '',
        'OUTPUT': 'D:/Output/mean_center.shp'
    }
    
    result = processing.run("native:meancoordinates", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Mean Center', 'ogr')
    QgsProject.instance().addMapLayer(layer)

mean_center()"""