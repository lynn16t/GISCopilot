tool_ID = "native:fixgeometries"

tool_name = "Repair Geometry"

brief_description = """Attempts to fix invalid geometries in a vector layer. Equivalent to ArcGIS Repair Geometry / Check Geometry."""

parameters = """INPUT: Input vector layer. Type: [vector: any]
METHOD: Repair method. 0: Sketchy, 1: Structure. Type: [enumeration] Default: 1
OUTPUT: Output layer with fixed geometries. Type: [vector: same as input]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def repair_geometry():
    params = {
        'INPUT': 'D:/Data/broken.shp',
        'METHOD': 1,
        'OUTPUT': 'D:/Output/fixed.shp'
    }
    
    result = processing.run("native:fixgeometries", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Fixed Geometries', 'ogr')
    QgsProject.instance().addMapLayer(layer)

repair_geometry()"""