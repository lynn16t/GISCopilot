tool_ID = "qgis:heatmapkerneldensityestimation"

tool_name = "Kernel Density Estimation (Heatmap)"

brief_description = """Creates a density raster (heatmap) from point features using kernel density estimation. Equivalent to ArcGIS Kernel Density / Heat Map."""

parameters = """INPUT: Input point layer. Type: [vector: point]
RADIUS: Search radius (bandwidth). Type: [number] Default: 100
PIXEL_SIZE: Output raster pixel size. Type: [number] Default: 10
WEIGHT_FIELD: Weight field (optional). Type: [tablefield: numeric]
KERNEL: Kernel shape. 0: Quartic, 1: Triangular, 2: Uniform, 3: Triweight, 4: Epanechnikov. Type: [enumeration] Default: 0
OUTPUT: Output density raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def kernel_density():
    params = {
        'INPUT': 'D:/Data/crime_points.shp',
        'RADIUS': 500,
        'PIXEL_SIZE': 50,
        'WEIGHT_FIELD': '',
        'KERNEL': 0,
        'OUTPUT': 'D:/Output/heatmap.tif'
    }
    
    result = processing.run("qgis:heatmapkerneldensityestimation", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Kernel Density')
    QgsProject.instance().addMapLayer(layer)

kernel_density()"""