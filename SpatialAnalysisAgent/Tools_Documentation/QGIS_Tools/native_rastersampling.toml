tool_ID = "native:rastersampling"

tool_name = "Sample raster values"

brief_description = """Extracts raster values at point feature locations and writes them as new attribute columns on the points. If the raster is multiband, one column per band is added.

NOTE: the legacy ID `native:samplerastervalues` does NOT exist in QGIS 3.40 — always use `native:rastersampling`. Parameter name is `RASTERCOPY` (not `RASTER` / `INPUT_RASTER`)."""

parameters = """INPUT: Point vector layer to sample. Type: [vector: point]
RASTERCOPY: Raster layer to sample at the given point locations. Type: [raster]
COLUMN_PREFIX: Prefix for the names of the added columns. Type: [string] Default: 'SAMPLE_'
OUTPUT: Output point layer with sampled value columns. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def raster_sampling():
    input_points = 'D:/Data/points.shp'
    input_raster = 'D:/Data/dem.tif'
    output_path  = 'D:/Output/sampled_points.shp'

    params = {
        'INPUT': input_points,
        'RASTERCOPY': input_raster,    # NB: parameter name is RASTERCOPY, not RASTER
        'COLUMN_PREFIX': 'elev_',
        'OUTPUT': output_path,
    }

    result = processing.run("native:rastersampling", params)

    sampled = QgsVectorLayer(result['OUTPUT'], 'Sampled Points', 'ogr')
    QgsProject.instance().addMapLayer(sampled)

raster_sampling()"""
