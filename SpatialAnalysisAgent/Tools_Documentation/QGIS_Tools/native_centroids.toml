tool_ID = "native:centroids"

tool_name = "Feature to Point (Centroids)"

brief_description = """Creates a point layer containing centroids of input polygon or line features. Equivalent to ArcGIS Feature to Point."""

parameters = """INPUT: Input vector layer. Type: [vector: any]
ALL_PARTS: Create centroid for each part of multi-part features. Type: [boolean] Default: False
OUTPUT: Output point layer. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def feature_to_point():
    params = {
        'INPUT': 'D:/Data/polygons.shp',
        'ALL_PARTS': False,
        'OUTPUT': 'D:/Output/centroids.shp'
    }
    
    result = processing.run("native:centroids", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Centroids', 'ogr')
    QgsProject.instance().addMapLayer(layer)

feature_to_point()"""