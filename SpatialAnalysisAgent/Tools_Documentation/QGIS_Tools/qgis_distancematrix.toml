tool_ID = "qgis:distancematrix"

tool_name = "Near (Distance Matrix)"

brief_description = """Calculates the distance between each feature in an input layer and the nearest feature(s) in a target layer. Equivalent to ArcGIS Near Analysis."""

parameters = """INPUT: Input point layer. Type: [vector: point]
INPUT_FIELD: Input layer ID field. Type: [tablefield: any]
TARGET: Target point layer. Type: [vector: point]
TARGET_FIELD: Target layer ID field. Type: [tablefield: any]
MATRIX_TYPE: Output matrix type. 0: Linear (N*k x 3), 1: Standard (N x T), 2: Summary (N x 1). Type: [enumeration] Default: 0
NEAREST_POINTS: Number of nearest points. Type: [number] Default: 0 (all)
OUTPUT: Output distance matrix. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def near_analysis():
    input_path = 'D:/Data/points.shp'
    target_path = 'D:/Data/facilities.shp'
    output_path = 'D:/Output/near_table.shp'
    
    params = {
        'INPUT': input_path,
        'INPUT_FIELD': 'ID',
        'TARGET': target_path,
        'TARGET_FIELD': 'ID',
        'MATRIX_TYPE': 0,
        'NEAREST_POINTS': 1,
        'OUTPUT': output_path
    }
    
    result = processing.run("qgis:distancematrix", params)
    
    output_layer = QgsVectorLayer(result['OUTPUT'], 'Near Table', 'ogr')
    QgsProject.instance().addMapLayer(output_layer)

near_analysis()"""