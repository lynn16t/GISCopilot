tool_ID = "native:rasterlayerzonalstats"

tool_name = "Zonal Statistics"

brief_description = """Calculates statistics of a raster layer for each feature of an overlapping polygon vector layer. Equivalent to ArcGIS Zonal Statistics / Zonal Statistics as Table."""

parameters = """INPUT: Input polygon vector layer defining zones. Type: [vector: polygon]
INPUT_RASTER: Input raster layer to calculate statistics on. Type: [raster]
RASTER_BAND: Raster band number. Type: [raster band] Default: 1
COLUMN_PREFIX: Prefix for output columns. Type: [string] Default: '_'
STATISTICS: Statistics to calculate. Type: [enumeration] [list]
OUTPUT: Output vector layer with statistics. Type: [vector: polygon]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def zonal_statistics():
    params = {
        'INPUT': 'D:/Data/zones.shp',
        'INPUT_RASTER': 'D:/Data/values.tif',
        'RASTER_BAND': 1,
        'COLUMN_PREFIX': 'zs_',
        'STATISTICS': [0, 1, 2],
        'OUTPUT': 'D:/Output/zonal_stats.shp'
    }
    
    result = processing.run("native:zonalstatisticsfb", params)
    
    output_layer = QgsVectorLayer(result['OUTPUT'], 'Zonal Statistics', 'ogr')
    QgsProject.instance().addMapLayer(output_layer)

zonal_statistics()"""