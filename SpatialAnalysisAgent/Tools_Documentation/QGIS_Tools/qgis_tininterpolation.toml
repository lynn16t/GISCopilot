tool_ID = "qgis:tininterpolation"

tool_name = "TIN Interpolation"

brief_description = """Generates a TIN (Triangulated Irregular Network) interpolation of a point vector layer using Delaunay triangulation. Equivalent to ArcGIS Create TIN / TIN To Raster / Natural Neighbor."""

parameters = """INTERPOLATION_DATA: Vector layer(s) and field(s) for interpolation. Type: [string]
METHOD: Interpolation method. 0: Linear, 1: Clough-Toucher (cubic). Type: [enumeration] Default: 0
EXTENT: Extent of the output raster layer. Type: [extent]
PIXEL_SIZE: Output raster cell size. Type: [number] Default: 0.1
OUTPUT: Output interpolated raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsVectorLayer, QgsProject, QgsRasterLayer

def tin_interpolation(input_path, attribute):
    input_layer = QgsVectorLayer(input_path, "Input Layer", "ogr")
    fields = input_layer.fields()
    attr_index = fields.indexOf(attribute)
    
    params = {
        'INTERPOLATION_DATA': f"{input_path}::~::0::~::{attr_index}::~::0",
        'METHOD': 0,
        'EXTENT': input_layer.extent(),
        'PIXEL_SIZE': 0.001,
        'OUTPUT': 'D:/Output/tin_interp.tif'
    }
    
    result = processing.run("qgis:tininterpolation", params)
    
    raster = QgsRasterLayer(result['OUTPUT'], 'TIN Interpolation')
    QgsProject.instance().addMapLayer(raster)

tin_interpolation('D:/Data/points.shp', 'elevation')"""