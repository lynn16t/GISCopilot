tool_ID = "native:multiringconstantbuffer"

tool_name = "Multiple Ring Buffer"

brief_description = """Creates multiple buffer rings around input features at specified distances. Equivalent to ArcGIS Multiple Ring Buffer."""

parameters = """INPUT: Input vector layer. Type: [vector: any]
RINGS: Number of rings. Type: [number] Default: 1
DISTANCE: Distance between rings. Type: [number] Default: 1
OUTPUT: Output polygon layer with buffer rings. Type: [vector: polygon]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def multi_ring_buffer():
    params = {
        'INPUT': 'D:/Data/facilities.shp',
        'RINGS': 3,
        'DISTANCE': 500,
        'OUTPUT': 'D:/Output/multi_buffer.shp'
    }
    
    result = processing.run("native:multiringconstantbuffer", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Multi Ring Buffer', 'ogr')
    QgsProject.instance().addMapLayer(layer)

multi_ring_buffer()"""