tool_ID = "native:pointstopath"

tool_name = "Points to Line (XY to Line)"

brief_description = """Converts ordered point features to line features by connecting them in sequence. Equivalent to ArcGIS Points to Line / XY to Line."""

parameters = """INPUT: Input point layer. Type: [vector: point]
CLOSE_PATH: Close path to create polygon. Type: [boolean] Default: False
ORDER_EXPRESSION: Expression for ordering points. Type: [expression]
NATURAL_SORT: Natural sort order. Type: [boolean] Default: False
GROUP_EXPRESSION: Expression for grouping points into separate lines. Type: [expression]
OUTPUT: Output line layer. Type: [vector: line]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def points_to_line():
    params = {
        'INPUT': 'D:/Data/gps_track.shp',
        'CLOSE_PATH': False,
        'ORDER_EXPRESSION': '"timestamp"',
        'NATURAL_SORT': False,
        'GROUP_EXPRESSION': '"track_id"',
        'OUTPUT': 'D:/Output/track_lines.shp'
    }
    
    result = processing.run("native:pointstopath", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Lines from Points', 'ogr')
    QgsProject.instance().addMapLayer(layer)

points_to_line()"""