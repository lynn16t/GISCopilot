tool_ID = "native:linedensity"

tool_name = "Line Density"

brief_description = """Calculates kernel line density for line features within a search radius. Equivalent to ArcGIS Line Density."""

parameters = """INPUT: Input line vector layer. Type: [vector: line]
WEIGHT: Weight field. Type: [tablefield: numeric]
RADIUS: Search radius. Type: [number] Default: 10
PIXEL_SIZE: Output raster cell size. Type: [number] Default: 10
OUTPUT: Output density raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def line_density():
    params = {
        'INPUT': 'D:/Data/roads.shp',
        'WEIGHT': '',
        'RADIUS': 500,
        'PIXEL_SIZE': 50,
        'OUTPUT': 'D:/Output/line_density.tif'
    }
    
    result = processing.run("native:linedensity", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Line Density')
    QgsProject.instance().addMapLayer(layer)

line_density()"""