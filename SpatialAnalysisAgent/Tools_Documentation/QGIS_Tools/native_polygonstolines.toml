tool_ID = "native:polygonstolines"

tool_name = "Feature to Line (Polygons to Lines)"

brief_description = """Converts polygon features to line features using polygon boundaries. Equivalent to ArcGIS Feature to Line."""

parameters = """INPUT: Input polygon layer. Type: [vector: polygon]
OUTPUT: Output line layer. Type: [vector: line]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def feature_to_line():
    params = {
        'INPUT': 'D:/Data/polygons.shp',
        'OUTPUT': 'D:/Output/lines.shp'
    }
    
    result = processing.run("native:polygonstolines", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Lines from Polygons', 'ogr')
    QgsProject.instance().addMapLayer(layer)

feature_to_line()"""