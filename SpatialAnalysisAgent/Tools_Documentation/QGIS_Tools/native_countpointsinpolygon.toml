tool_ID = "native:countpointsinpolygon"

tool_name = "Summarize Within (Count Points in Polygon)"

brief_description = """Counts the number of points from a point layer that fall within each polygon of a polygon layer. Equivalent to ArcGIS Summarize Within."""

parameters = """POLYGONS: Input polygon layer. Type: [vector: polygon]
POINTS: Input point layer. Type: [vector: point]
WEIGHT: Weight field. Type: [tablefield: numeric]
CLASSFIELD: Classification field. Type: [tablefield: any]
FIELD: Output count field name. Type: [string] Default: 'NUMPOINTS'
OUTPUT: Output polygon layer with counts. Type: [vector: polygon]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def summarize_within():
    params = {
        'POLYGONS': 'D:/Data/census_tracts.shp',
        'POINTS': 'D:/Data/crime_incidents.shp',
        'WEIGHT': '',
        'CLASSFIELD': '',
        'FIELD': 'CRIME_COUNT',
        'OUTPUT': 'D:/Output/crime_counts.shp'
    }
    
    result = processing.run("native:countpointsinpolygon", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Summarize Within', 'ogr')
    QgsProject.instance().addMapLayer(layer)

summarize_within()"""