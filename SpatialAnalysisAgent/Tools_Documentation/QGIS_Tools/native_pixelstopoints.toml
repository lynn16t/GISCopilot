tool_ID = "native:pixelstopoints"

tool_name = "Raster to Point"

brief_description = """Converts every pixel of a raster layer into a point feature with the raster value as attribute. Equivalent to ArcGIS Raster to Point."""

parameters = """INPUT_RASTER: Input raster layer. Type: [raster]
RASTER_BAND: Band number. Type: [raster band] Default: 1
FIELD_NAME: Name of the field to store raster values. Type: [string] Default: 'VALUE'
OUTPUT: Output point vector layer. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def raster_to_point():
    params = {
        'INPUT_RASTER': 'D:/Data/raster.tif',
        'RASTER_BAND': 1,
        'FIELD_NAME': 'VALUE',
        'OUTPUT': 'D:/Output/raster_points.shp'
    }
    
    result = processing.run("native:pixelstopoints", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Raster to Points', 'ogr')
    QgsProject.instance().addMapLayer(layer)

raster_to_point()"""