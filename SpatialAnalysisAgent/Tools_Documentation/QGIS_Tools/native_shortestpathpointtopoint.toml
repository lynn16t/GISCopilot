tool_ID = "native:shortestpathpointtopoint"

tool_name = "Least Cost Path"

brief_description = """Calculates the shortest (least cost) path between two points on a network or cost surface. Equivalent to ArcGIS Least Cost Path / Cost Path."""

parameters = """INPUT: Vector layer representing the network. Type: [vector: line]
START_POINT: Starting point coordinates. Type: [point]
END_POINT: Ending point coordinates. Type: [point]
STRATEGY: Path type. 0: Shortest, 1: Fastest. Type: [enumeration] Default: 0
OUTPUT: Output line layer with the shortest path. Type: [vector: line]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer, QgsPointXY

def least_cost_path():
    input_path = 'D:/Data/road_network.shp'
    output_path = 'D:/Output/shortest_path.shp'
    
    params = {
        'INPUT': input_path,
        'START_POINT': '500000,4500000',
        'END_POINT': '510000,4510000',
        'STRATEGY': 0,
        'DIRECTION_FIELD': '',
        'VALUE_FORWARD': '',
        'VALUE_BACKWARD': '',
        'VALUE_BOTH': '',
        'DEFAULT_DIRECTION': 2,
        'SPEED_FIELD': '',
        'DEFAULT_SPEED': 50,
        'TOLERANCE': 0,
        'OUTPUT': output_path
    }
    
    result = processing.run("native:shortestpathpointtopoint", params)
    
    path_layer = QgsVectorLayer(result['OUTPUT'], 'Least Cost Path', 'ogr')
    QgsProject.instance().addMapLayer(path_layer)

least_cost_path()"""