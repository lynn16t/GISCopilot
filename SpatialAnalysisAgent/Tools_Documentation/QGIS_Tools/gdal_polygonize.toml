tool_ID = "gdal:polygonize"

tool_name = "Raster to Polygon"

brief_description = """Converts a raster layer to a polygon vector layer. Each connected region of same-value pixels becomes a polygon feature. Equivalent to ArcGIS Raster to Polygon."""

parameters = """INPUT: Input raster layer. Type: [raster]
BAND: Band number. Type: [raster band] Default: 1
FIELD: Name for the attribute field. Type: [string] Default: 'DN'
EIGHT_CONNECTEDNESS: Use 8-connectivity. Type: [boolean] Default: False
OUTPUT: Output polygon vector layer. Type: [vector: polygon]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def raster_to_polygon():
    params = {
        'INPUT': 'D:/Data/classified.tif',
        'BAND': 1,
        'FIELD': 'class',
        'EIGHT_CONNECTEDNESS': False,
        'OUTPUT': 'D:/Output/polygons.shp'
    }
    
    result = processing.run("gdal:polygonize", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Raster to Polygon', 'ogr')
    QgsProject.instance().addMapLayer(layer)

raster_to_polygon()"""