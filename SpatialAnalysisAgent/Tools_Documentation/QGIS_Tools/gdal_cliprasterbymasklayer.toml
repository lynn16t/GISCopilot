tool_ID = "gdal:cliprasterbymasklayer"

tool_name = "Extract by Mask (Clip Raster by Mask)"

brief_description = """Clips a raster layer using a polygon mask layer, extracting only the raster data that falls within the mask. Equivalent to ArcGIS Extract by Mask."""

parameters = """INPUT: Input raster layer. Type: [raster]
MASK: Mask polygon layer. Type: [vector: polygon]
NODATA: NoData value for clipped output. Type: [number]
CROP_TO_CUTLINE: Crop to mask extent. Type: [boolean] Default: True
OUTPUT: Output clipped raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def extract_by_mask():
    params = {
        'INPUT': 'D:/Data/dem.tif',
        'MASK': 'D:/Data/study_area.shp',
        'NODATA': -9999,
        'CROP_TO_CUTLINE': True,
        'KEEP_RESOLUTION': True,
        'OUTPUT': 'D:/Output/clipped_dem.tif'
    }
    
    result = processing.run("gdal:cliprasterbymasklayer", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Extracted by Mask')
    QgsProject.instance().addMapLayer(layer)

extract_by_mask()"""