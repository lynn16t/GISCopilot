tool_ID = "native:splitlinesbylength"

tool_name = "Split Line at Vertices"

brief_description = """Splits line features at each vertex, creating individual line segments. Equivalent to ArcGIS Split Line at Vertices."""

parameters = """INPUT: Input line layer. Type: [vector: line]
LENGTH: Maximum line length. Type: [number]
OUTPUT: Output line layer with split segments. Type: [vector: line]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def split_at_vertices():
    params = {
        'INPUT': 'D:/Data/roads.shp',
        'OUTPUT': 'D:/Output/split_lines.shp'
    }
    
    result = processing.run("native:explodelines", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Split Lines', 'ogr')
    QgsProject.instance().addMapLayer(layer)

split_at_vertices()"""