tool_ID = "native:reclassifybytable"

tool_name = "Reclassify by Table"

brief_description = """Reclassifies a raster layer by assigning new values to ranges of old values defined in a reclassification table. Equivalent to ArcGIS Reclassify."""

parameters = """INPUT_RASTER: Input raster layer. Type: [raster]
RASTER_BAND: Band to reclassify. Type: [raster band] Default: 1
TABLE: Reclassification table (min, max, new value). Type: [table]
NO_DATA: Value for NoData cells. Type: [number] Default: -9999
RANGE_BOUNDARIES: Range boundaries handling. 0: min < value <= max, 1: min <= value < max. Type: [enumeration] Default: 0
OUTPUT: Output reclassified raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def reclassify():
    params = {
        'INPUT_RASTER': 'D:/Data/slope.tif',
        'RASTER_BAND': 1,
        'TABLE': [0, 10, 1, 10, 20, 2, 20, 45, 3, 45, 90, 4],
        'NO_DATA': -9999,
        'RANGE_BOUNDARIES': 0,
        'OUTPUT': 'D:/Output/reclass.tif'
    }
    
    result = processing.run("native:reclassifybytable", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Reclassified')
    QgsProject.instance().addMapLayer(layer)

reclassify()"""