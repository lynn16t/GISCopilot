tool_ID = "gdal:rastercalculator"

tool_name = "Raster Calculator (GDAL)"

brief_description = """Performs map algebra operations on raster layers using GDAL expressions. Supports arithmetic, logical, and trigonometric functions. Equivalent to ArcGIS Raster Calculator."""

parameters = """INPUT_A: Input raster layer A. Type: [raster]
BAND_A: Band number of raster A. Type: [raster band] Default: 1
FORMULA: Calculation formula using A, B, C... Type: [string]
NO_DATA: NoData value. Type: [number]
OUTPUT: Output raster. Type: [raster]"""

code_example = """import processing
from qgis.core import QgsProject, QgsRasterLayer

def raster_calculator():
    params = {
        'INPUT_A': 'D:/Data/dem.tif',
        'BAND_A': 1,
        'INPUT_B': None,
        'BAND_B': -1,
        'FORMULA': 'A * 3.28084',
        'NO_DATA': None,
        'RTYPE': 5,
        'OUTPUT': 'D:/Output/dem_feet.tif'
    }
    
    result = processing.run("gdal:rastercalculator", params)
    
    layer = QgsRasterLayer(result['OUTPUT'], 'Raster Calculator')
    QgsProject.instance().addMapLayer(layer)

raster_calculator()"""