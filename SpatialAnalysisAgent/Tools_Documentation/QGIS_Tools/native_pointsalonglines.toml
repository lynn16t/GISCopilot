tool_ID = "native:pointsalonglines"

tool_name = "Generate Points Along Lines"

brief_description = """Creates points at regular intervals along line features. Equivalent to ArcGIS Generate Points Along Lines."""

parameters = """INPUT: Input line layer. Type: [vector: line]
DISTANCE: Distance between points. Type: [number] Default: 1
START_OFFSET: Start offset. Type: [number] Default: 0
END_OFFSET: End offset. Type: [number] Default: 0
OUTPUT: Output point layer. Type: [vector: point]"""

code_example = """import processing
from qgis.core import QgsProject, QgsVectorLayer

def points_along_lines():
    params = {
        'INPUT': 'D:/Data/roads.shp',
        'DISTANCE': 100,
        'START_OFFSET': 0,
        'END_OFFSET': 0,
        'OUTPUT': 'D:/Output/points_along.shp'
    }
    
    result = processing.run("native:pointsalonglines", params)
    
    layer = QgsVectorLayer(result['OUTPUT'], 'Points Along Lines', 'ogr')
    QgsProject.instance().addMapLayer(layer)

points_along_lines()"""